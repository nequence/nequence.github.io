<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect: GitHub Pages returns 404 for unknown paths.
    // Save the path and redirect to / so React Router can handle it.
    const path = window.location.pathname + window.location.search + window.location.hash
    sessionStorage.setItem('redirect', path)
    window.location.replace('/')
  </script>
</head>
<body></body>
</html>
