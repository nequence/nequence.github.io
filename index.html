<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Sequence</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══════════════════ LANDING ═══════════════════ -->
<div id="landing-screen">
  <div id="landing-box">
    <div class="game-logo">♠ SEQUENCE ♠</div>
    <div class="game-subtitle">Online Multiplayer</div>

    <!-- Shown only when opened via invite link -->
    <div id="invite-header" class="hidden">
      <div class="invite-tag">You're invited to room</div>
      <div id="invite-code-badge" class="invite-code-badge"></div>
    </div>

    <input type="text" id="name-input" class="txt-input" placeholder="Your name…" maxlength="20" autocomplete="off"/>

    <!-- Avatar picker -->
    <div class="avatar-row-label">Pick your avatar</div>
    <div id="avatar-picker" class="avatar-picker"></div>

    <!-- Normal landing: create + join -->
    <div id="normal-landing">
      <button id="create-btn" class="pcount-btn">Create Room</button>
      <div class="landing-divider">— or join a room —</div>
      <div class="join-row">
        <input type="text" id="code-input" class="txt-input code-inp" placeholder="ROOM CODE" maxlength="6" autocomplete="off"/>
        <button id="join-btn" class="pcount-btn">Join</button>
      </div>
    </div>

    <!-- Invite landing: just a join button -->
    <button id="invite-join-btn" class="pcount-btn hidden">Join Room →</button>

    <div id="landing-error" class="error-msg"></div>
    <div id="setup-rules">
      <span>First to <strong>2 sequences</strong> wins</span>
      <span class="dot">·</span>
      <span>♥♦ J = Wild</span>
      <span class="dot">·</span>
      <span>♣♠ J = Remove</span>
    </div>
  </div>
</div>

<!-- ═══════════════════ LOBBY ═══════════════════ -->
<div id="lobby-screen" class="hidden">
  <div id="lobby-box">
    <div class="game-logo">♠ SEQUENCE ♠</div>
    <div class="room-code-row">
      <span class="room-code-label">Room Code</span>
      <span id="room-code-display" class="room-code-val">------</span>
      <button id="copy-link-btn" class="btn-sm">⎘ Copy Link</button>
    </div>

    <!-- Circle seating table -->
    <div id="lobby-table-wrap">
      <div id="lobby-table">
        <div id="lobby-table-label">SEQUENCE</div>
      </div>
    </div>

    <div id="lobby-waiting-msg" class="lobby-wait">Waiting for the host to start…</div>
    <button id="start-game-btn" class="pcount-btn hidden">▶ Start Game</button>
    <button id="leave-lobby-btn" class="btn-danger-sm">Leave Room</button>
  </div>
</div>

<!-- ═══════════════════ GAME ════════════════════ -->
<div id="game-screen" class="hidden">
  <div id="hud">
    <div id="turn-banner">Player 1's Turn</div>
    <div id="score-strip" aria-label="Sequence scores"></div>
    <div id="deck-info">
      <div id="deck-pile">
        <div class="deck-card-b"></div>
        <div class="deck-card-b"></div>
        <div class="deck-card-b"></div>
      </div>
      <span id="deck-count">104</span>&thinsp;cards
    </div>
  </div>
  <div id="main-area">
    <div id="left-panel" class="side-panel"></div>
    <div id="board-wrap">
      <div id="board-container">
        <div id="board"></div>
        <svg id="seq-lines" xmlns="http://www.w3.org/2000/svg" overflow="visible"></svg>
      </div>
    </div>
    <div id="right-panel" class="side-panel"></div>
  </div>
  <div id="bottom-bar">
    <div id="active-hand-label"></div>
    <div id="active-hand" class="hand-row"></div>
  </div>
  <div id="jack-legend">
    <span class="leg wild">♥♦ J = Place anywhere</span>
    <span class="leg-sep">·</span>
    <span class="leg remove">♣♠ J = Remove opponent chip</span>
  </div>
</div>

<!-- ═══════════════════ WIN ════════════════════ -->
<div id="win-overlay" class="hidden">
  <div id="win-box">
    <div id="win-crown">♛</div>
    <div id="win-text"></div>
    <div id="win-sub"></div>
    <button id="play-again-btn">New Game</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
